name = "kpec"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Gemini API는 한국 리전에서 차단 → Smart Placement로 미국에서 실행
[placement]
mode = "smart"

[vars]
ADMIN_EMAIL = "kjs010zzz@gmail.com"

[[r2_buckets]]
binding = "R2"
bucket_name = "kpecr2"

# D1: KPEC 콘텐츠 SoT (Airtable 대체)
# database_id는 `wrangler d1 create kpec` 실행 후 채움
[[d1_databases]]
binding = "DB"
database_name = "kpec"
database_id = "4163afb5-2ffd-4688-9360-d8f8e3a57748"

# 매일 KST 08:00 (UTC 23:00) — daily-report 텔레그램 발송
# 매일 KST 08:30 (UTC 23:30) — GA4 → D1 누적 (4 period + 어제 daily 스냅샷)
[triggers]
crons = ["0 23 * * *", "30 23 * * *"]
